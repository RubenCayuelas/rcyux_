<section class="posts-list">
  {% if site.posts.size == 0 %}
    <p class="posts-empty">No posts yet.</p>
  {% else %}
    <div class="posts-grid">
      {% for post in site.posts %}
        <a href="{{ post.url | relative_url }}" class="post-card">
          <div
            class="post-card__image{% unless post.cover_image %} post-card__image--empty{% endunless %}"
            {% if post.cover_image %}style="background-image: url('{{ post.cover_image | relative_url }}')"{% endif %}
          ></div>
          <div class="post-card__overlay">
            <h3 class="post-card__title">{{ post.title }}</h3>
            <span class="post-card__meta">
              {{ post.date | date: "%d.%m.%Y" }}
              {% if post.location %}<span class="post-card__location">{{ post.location }}</span>{% endif %}
            </span>
          </div>
        </a>
      {% endfor %}
    </div>
  {% endif %}
</section>
