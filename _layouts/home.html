<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" type="image/x-icon"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ '/assets/styles/App.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/lg.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/xl.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/sm.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/layouts/HomePage.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/includes/Post.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/includes/Footer.css' | relative_url }}">
  </head>
  <body class="homepage">
    <div>
      <!-- Index Banner -->
      <div class="background text-center">
        <h1>
          <img src="{{ '/assets/images/instagram_logo.svg' | relative_url }}" class="instagram-logo" alt="Instagram Logo"/>
          {{ page.title }}
        </h1>
      </div>

      <div class="content d-flex flex-column align-items-center align-items-md-start">
        <h2 class="text-center text-sm-start">{{ page.description.title }}</h2>
        <div class="justify-content-center d-flex mt-4">
          <p class="text-center text-sm-start col-md-9 pe-sm-5 pe-0">
            {{ page.description.text }}
          </p>
          <img class="col-lg-2 col-md-3 d-md-flex d-none img-fluid" src="{{ page.description.img | relative_url }}" alt="Imagen estatua" />
        </div>

        <!-- Posts -->
        <h2>Latest Posts</h2>
        {% include posts.html %}
      </div>
    </div>

    <br><br><br> <!-- ToDo: Delete this when footer not WIP -->
    <!-- Footer -->
    {% include footer.html %}
  </body>
</html>
