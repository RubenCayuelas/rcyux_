<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" type="image/x-icon"/>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ '/assets/styles/App.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/lg.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/xl.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/sm.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/layouts/HomePage.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/includes/Post.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/includes/Footer.css' | relative_url }}">
  </head>
  <body class="homepage">
    <div>
      <!-- Index Banner -->
      <div class="background text-center">
        <h1>
          <img src="{{ '/assets/images/instagram_logo.svg' | relative_url }}" class="instagram-logo" alt="Instagram Logo"/>
          {{ page.title }}
        </h1>
      </div>

      <div class="content d-flex flex-column align-items-center align-items-md-start">
        <h2 class="text-center text-sm-start">{{ page.description.title }}</h2>
        <div class="description-wrapper justify-content-center d-flex mt-4">
          <p class="text-center text-sm-start col-md-9 pe-sm-5 pe-0">
            {{ page.description.text }}
          </p>
          <div class="description-collage d-md-flex d-none">
            <img class="collage__vertical" src="{{ page.description.collage[0].src | relative_url }}" alt="{{ page.description.collage[0].alt }}" />
            <div class="collage__squares">
              <img src="{{ page.description.collage[1].src | relative_url }}" alt="{{ page.description.collage[1].alt }}" />
              <img src="{{ page.description.collage[2].src | relative_url }}" alt="{{ page.description.collage[2].alt }}" />
            </div>
          </div>
        </div>
        <hr class="separator my-5" />

        <!-- Posts -->
        <h2>{{ page.posts.title }}</h2>
        {% include posts.html %}
      </div>
    </div>

    <br><br><br> <!-- ToDo: Delete this when footer not WIP -->
    <!-- Footer -->
    {% include footer.html %}
  </body>
</html>
