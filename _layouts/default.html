<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}" type="image/x-icon"/>

    <!-- SEO -->
    <meta name="description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
    <meta name="author" content="{{ site.author | default: site.title }}">
    <link rel="canonical" href="{{ page.url | absolute_url }}">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_ES">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description | strip_html | strip_newlines | truncate: 160 }}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="{{ '/assets/styles/App.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/lg.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/xl.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/sm.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/HomePage.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/styles/includes/Footer.css' | relative_url }}">
  </head>
  <body class="App">

    {{ content }}

    <!-- Footer -->
    {% include footer.html %}
  </body>
</html>
